name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']   # test across supported Node versions

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - run: npm ci

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test -- --run
      - run: npm run build

      - name: Check dist size
        run: |
          echo "=== dist/ contents ==="
          ls -lh dist/
          echo "=== Total dist size ==="
          du -sh dist/
